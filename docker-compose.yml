services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cowork-app
    restart: unless-stopped
    env_file: .env.production
    networks:
      - web

  nginx:
    image: nginx:1.25-alpine
    container_name: cowork-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/certbot/conf:/etc/letsencrypt:ro
      - ./infra/certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - web

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: cowork-whisper
    restart: unless-stopped
    environment:
      - ASR_MODEL=base
      - ASR_ENGINE=faster_whisper
    networks:
      - web

  certbot:
    image: certbot/certbot:latest
    container_name: cowork-certbot
    volumes:
      - ./infra/certbot/conf:/etc/letsencrypt
      - ./infra/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    restart: unless-stopped

networks:
  web:
    driver: bridge

services:
  postgres:
    image: postgres:15
    container_name: cowork-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dex
      POSTGRES_PASSWORD: Penalo2122$
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./pg-init:/docker-entrypoint-initdb.d
    networks:
      - backend_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dex -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  cowork-app:
    image: cowork-agency:latest
    container_name: cowork-app
    restart: unless-stopped
    env_file: .env.production
    networks:
      - traefik_public
      - backend_internal
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /app/uploads:/app/uploads
    labels:
      - traefik.enable=true
      - traefik.http.routers.cowork-app.rule=Host(`app.somosdex.com`)
      - traefik.http.routers.cowork-app.entrypoints=websecure
      - traefik.http.routers.cowork-app.tls.certresolver=letsencrypt
      - traefik.http.routers.cowork-app-http.rule=Host(`app.somosdex.com`)
      - traefik.http.routers.cowork-app-http.entrypoints=web
      - traefik.http.routers.cowork-app-http.middlewares=redirect-to-https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.services.cowork-app.loadbalancer.server.port=3000

volumes:
  pgdata:

networks:
  traefik_public:
    external: true
  backend_internal:
    external: true
